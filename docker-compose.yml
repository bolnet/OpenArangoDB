services:
  arangodb:
    image: arangodb:3.12
    ports:
      - "8529:8529"
    environment:
      ARANGO_ROOT_PASSWORD: ""
      ARANGO_NO_AUTH: "1"
    volumes:
      - arangodb_data:/var/lib/arangodb3

  openarangodb:
    build: .
    depends_on:
      - arangodb
    environment:
      ARANGODB_HOST: http://arangodb:8529
      ARANGODB_DATABASE: argondb
      ARANGODB_USERNAME: root
      ARANGODB_PASSWORD: ""
      ARANGODB_AUDIT: "true"
      ARANGODB_CDC: "true"
    stdin_open: true

volumes:
  arangodb_data:
